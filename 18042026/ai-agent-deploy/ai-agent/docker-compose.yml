version: '3.8'

services:
  ai-agent:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=3000
      - AI_MODEL=${AI_MODEL:-claude-sonnet-4-20250514}
      - MAX_TOKENS=${MAX_TOKENS:-1500}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
