global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'guvid-services'
    static_configs:
      - targets:
        - 'api-gateway:8080'
        - 'tenant-svc:8094'
        - 'institution-svc:8082'
        - 'hr-portal-svc:8091'
        - 'regulatory-svc:8093'
        - 'guvid-svc:8084'
        - 'verify-svc:8085'
    metrics_path: '/metrics'
