name: GUVID CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/guvid

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          working-directory: services/api-gateway

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, tenant-svc, institution-svc, hr-portal-svc, verify-svc, guvid-svc]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - name: Test ${{ matrix.service }}
        run: |
          cd services/${{ matrix.service }}
          go mod tidy
          go build ./...

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, tenant-svc, institution-svc, hr-portal-svc, regulatory-svc, verify-svc, guvid-svc, wallet-svc, consent-svc, fraud-svc, mock-integrations]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }} \
            services/${{ matrix.service }}/

  integration-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start services
        run: |
          cp .env.example .env
          docker compose up -d mariadb redis
          sleep 20
          docker compose up -d tenant-svc institution-svc hr-portal-svc verify-svc mock-integrations
          sleep 15
      - name: Health checks
        run: |
          for port in 8082 8085 8091 8094 8099; do
            curl -f http://localhost:$port/health || exit 1
          done
      - name: Smoke test login
        run: |
          curl -sf -X POST http://localhost:8094/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"hr@google.com","password":"Admin@123","tenantSlug":"google-hr"}'

  deploy-staging:
    needs: integration-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to staging
        run: echo "kubectl set image deployment/api-gateway api-gateway=${IMAGE_PREFIX}/api-gateway:${GITHUB_SHA} -n guvid-staging"
