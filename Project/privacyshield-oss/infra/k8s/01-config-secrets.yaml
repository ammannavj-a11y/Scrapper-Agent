---
# ── ConfigMap — non-sensitive environment config ──────────────────────────────
# Secrets are managed via External Secrets Operator → AWS Secrets Manager
# NEVER put sensitive values (keys, passwords) in ConfigMap or in Git
apiVersion: v1
kind: ConfigMap
metadata:
  name: privacyshield-config
  namespace: privacyshield
data:
  ENVIRONMENT: "production"
  APP_VERSION: "1.0.0"
  DEBUG: "false"
  API_V1_PREFIX: "/api/v1"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  ALGORITHM: "HS256"
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_OVERFLOW: "40"
  DATABASE_ECHO: "false"
  CRAWLER_MAX_PAGES: "100"
  CRAWLER_TIMEOUT_SECONDS: "30"
  CRAWLER_USER_AGENT: "PrivacyShieldBot/1.0 (+https://privacyshield.ai/bot)"
  DATA_BROKER_LIST_PATH: "/app/data/data_brokers.json"
  RESCAN_INTERVAL_HOURS: "168"
  SPACY_MODEL: "en_core_web_trf"
  NLP_CONFIDENCE_THRESHOLD: "0.85"
  ENABLE_VOICE_INTEGRATION: "true"
  ENABLE_BROWSER_EXTENSION_API: "true"
  AWS_REGION: "ap-south-1"
  S3_BUCKET: "privacyshield-exports"
  RATE_LIMIT_PER_MINUTE: "60"
  ALLOWED_HOSTS: "privacyshield.ai,api.privacyshield.ai"

---
# ── ExternalSecret — pulls from AWS Secrets Manager via ESO ──────────────────
# Install External Secrets Operator:
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: privacyshield-secrets
  namespace: privacyshield
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: privacyshield-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: privacyshield/production
        property: SECRET_KEY
    - secretKey: DATABASE_URL
      remoteRef:
        key: privacyshield/production
        property: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: privacyshield/production
        property: REDIS_URL
    - secretKey: CELERY_BROKER_URL
      remoteRef:
        key: privacyshield/production
        property: CELERY_BROKER_URL
    - secretKey: CELERY_RESULT_BACKEND
      remoteRef:
        key: privacyshield/production
        property: CELERY_RESULT_BACKEND
    - secretKey: GOOGLE_CUSTOM_SEARCH_API_KEY
      remoteRef:
        key: privacyshield/production
        property: GOOGLE_CUSTOM_SEARCH_API_KEY
    - secretKey: GOOGLE_SEARCH_ENGINE_ID
      remoteRef:
        key: privacyshield/production
        property: GOOGLE_SEARCH_ENGINE_ID
    - secretKey: SENDGRID_API_KEY
      remoteRef:
        key: privacyshield/production
        property: SENDGRID_API_KEY
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: privacyshield/production
        property: STRIPE_SECRET_KEY
    - secretKey: STRIPE_WEBHOOK_SECRET
      remoteRef:
        key: privacyshield/production
        property: STRIPE_WEBHOOK_SECRET
    - secretKey: STRIPE_PRICE_BASIC
      remoteRef:
        key: privacyshield/production
        property: STRIPE_PRICE_BASIC
    - secretKey: STRIPE_PRICE_PRO
      remoteRef:
        key: privacyshield/production
        property: STRIPE_PRICE_PRO
    - secretKey: STRIPE_PRICE_ENTERPRISE
      remoteRef:
        key: privacyshield/production
        property: STRIPE_PRICE_ENTERPRISE
    - secretKey: SENTRY_DSN
      remoteRef:
        key: privacyshield/production
        property: SENTRY_DSN
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: privacyshield/production
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: privacyshield/production
        property: AWS_SECRET_ACCESS_KEY
    - secretKey: BACKEND_CORS_ORIGINS
      remoteRef:
        key: privacyshield/production
        property: BACKEND_CORS_ORIGINS
