
<!DOCTYPE html>
<html>
<head>
<title>UVI Dashboard</title>
<style>
body { background:black; color:white; font-family:Arial; text-align:center; }
button { padding:10px; margin:10px; }
</style>
</head>
<body>
<h1>UVI Control Panel</h1>
<button onclick="callAPI()">Check Backend</button>
<p id="res"></p>

<script>
function callAPI(){
 fetch("http://localhost:8080/")
 .then(res=>res.json())
 .then(data=>{
   document.getElementById("res").innerText = data.message;
 });
}
</script>
</body>
</html>
