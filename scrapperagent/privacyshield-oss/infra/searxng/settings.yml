use_default_settings: true

server:
  secret_key: "changeme-searxng-secret-32chars!!"
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"

engines:
  - name: google
    engine: google
    shortcut: g
    use_mobile_ui: false
  - name: bing
    engine: bing
    shortcut: b
  - name: duckduckgo
    engine: duckduckgo
    shortcut: d

outgoing:
  request_timeout: 15.0
  max_request_timeout: 30.0
  useragent_suffix: "PrivacyShieldBot"
