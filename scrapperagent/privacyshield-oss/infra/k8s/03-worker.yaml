---
# ── Celery Worker Deployment ──────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: privacyshield
  labels:
    app: worker
    tier: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: worker
    spec:
      serviceAccountName: privacyshield-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false

      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis-service 6379; do echo waiting; sleep 2; done"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]

      containers:
        - name: worker
          image: ghcr.io/your-org/privacyshield-backend:latest
          imagePullPolicy: Always
          command: [
            "celery", "-A", "app.workers.celery_app", "worker",
            "--loglevel=info",
            "--concurrency=4",
            "--max-tasks-per-child=100",
            "-Q", "default,scans,removals"
          ]

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]

          envFrom:
            - configMapRef:
                name: privacyshield-config
            - secretRef:
                name: privacyshield-secrets

          resources:
            requests:
              cpu: "1"
              memory: "2Gi"      # NLP models + Playwright
            limits:
              cpu: "4"
              memory: "8Gi"

          livenessProbe:
            exec:
              command: ["celery", "-A", "app.workers.celery_app", "inspect", "ping", "-t", "10"]
            initialDelaySeconds: 60
            periodSeconds: 60
            failureThreshold: 3

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /app/data

      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          configMap:
            name: data-broker-list

---
# ── Celery Beat Deployment (1 replica only) ───────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-beat
  namespace: privacyshield
  labels:
    app: worker-beat
spec:
  replicas: 1    # MUST be 1 — multiple beats cause duplicate task firing
  selector:
    matchLabels:
      app: worker-beat
  template:
    metadata:
      labels:
        app: worker-beat
    spec:
      serviceAccountName: privacyshield-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false

      containers:
        - name: beat
          image: ghcr.io/your-org/privacyshield-backend:latest
          imagePullPolicy: Always
          command: [
            "celery", "-A", "app.workers.celery_app", "beat",
            "--loglevel=info",
            "--scheduler", "celery.beat:PersistentScheduler"
          ]

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]

          envFrom:
            - configMapRef:
                name: privacyshield-config
            - secretRef:
                name: privacyshield-secrets

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          volumeMounts:
            - name: beat-schedule
              mountPath: /app/celerybeat-schedule

      volumes:
        - name: beat-schedule
          emptyDir: {}

---
# ── Worker HPA ────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa
  namespace: privacyshield
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
