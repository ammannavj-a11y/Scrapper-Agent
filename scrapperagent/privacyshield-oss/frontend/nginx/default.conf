server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                   always;
    add_header X-Frame-Options           "DENY"                      always;
    add_header X-XSS-Protection          "1; mode=block"             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.privacyshield.ai; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none';"
        always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_comp_level 6;
    gzip_min_length 1000;

    # ── Cache policy for static assets ───────────────────────────────────────
    location ~* \.(js|css|woff2|woff|ttf|eot|ico|png|jpg|jpeg|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
        access_log off;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Block sensitive paths ─────────────────────────────────────────────────
    location ~ /\. { deny all; access_log off; }
    location = /favicon.ico { access_log off; }
}
