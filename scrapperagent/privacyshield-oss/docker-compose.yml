version: "3.9"
# PrivacyShield — 100% Open-Source Stack
# Proprietary → OSS replacements:
#   Google Custom Search → SearXNG (AGPL-3.0)
#   SendGrid             → Mailhog/Stalwart (MIT/Apache-2.0)
#   AWS S3               → MinIO (Apache-2.0)
#   AWS Secrets Manager  → Vault OSS ≤1.13 (MPL-2.0)
#   Sentry SaaS          → GlitchTip (MIT)
#   Stripe               → Kill-Bill (Apache-2.0)
# Usage: cp backend/.env.example backend/.env && docker compose up --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: privacyshield
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: privacyshield
    volumes: [postgres_data:/var/lib/postgresql/data]
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U privacyshield"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes: [redis_data:/data]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  searxng:
    image: searxng/searxng:latest   # AGPL-3.0
    restart: unless-stopped
    ports: ["8888:8080"]
    volumes:
      - ./infra/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_SECRET_KEY: changeme-searxng-secret-32chars!!

  mailhog:
    image: mailhog/mailhog:latest   # MIT — SMTP dev catch-all
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI http://localhost:8025

  minio:
    image: minio/minio:latest       # Apache-2.0 — S3-compatible storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes: [minio_data:/data]
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console http://localhost:9001

  vault:
    image: hashicorp/vault:1.13.13  # MPL-2.0 (last before BSL)
    restart: unless-stopped
    cap_add: [IPC_LOCK]
    ports: ["8200:8200"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    command: server -dev
    volumes: [vault_data:/vault/data]

  glitchtip:
    image: glitchtip/glitchtip:latest  # MIT — OSS Sentry alternative
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://privacyshield:devpassword@postgres:5432/glitchtip
      SECRET_KEY: changeme-glitchtip-secret
      PORT: "8010"
      EMAIL_URL: smtp://mailhog:1025
      GLITCHTIP_DOMAIN: http://localhost:8010
    ports: ["8010:8010"]
    command: sh -c "bash /code/bin/run-migrate.sh && gunicorn glitchtip.wsgi --bind 0.0.0.0:8010 --workers 2"

  killbill_db:
    image: killbill/mariadb:0.24
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: killbillroot
    volumes: [killbill_db_data:/var/lib/mysql]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-pkillbillroot"]
      interval: 10s
      retries: 10

  killbill:
    image: killbill/killbill:0.24.10  # Apache-2.0 — OSS billing
    restart: unless-stopped
    ports: ["8080:8080"]
    environment:
      KILLBILL_DAO_URL: jdbc:mysql://killbill_db:3306/killbill
      KILLBILL_DAO_USER: killbill
      KILLBILL_DAO_PASSWORD: killbill
    depends_on:
      killbill_db:
        condition: service_healthy

  kaui:
    image: killbill/kaui:3.0.9
    restart: unless-stopped
    ports: ["9090:9090"]
    environment:
      KAUI_CONFIG_DAO_URL: jdbc:mysql://killbill_db:3306/kaui
      KAUI_CONFIG_DAO_USER: killbill
      KAUI_CONFIG_DAO_PASSWORD: killbill
    depends_on: [killbill]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://privacyshield:devpassword@postgres:5432/privacyshield
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SEARXNG_URL: http://searxng:8080
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: [./backend:/app]
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://privacyshield:devpassword@postgres:5432/privacyshield
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SEARXNG_URL: http://searxng:8080
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes: [./backend:/app]
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      FLOWER_PORT: "5555"
    ports: ["5555:5555"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports: ["3000:3000"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000

  prometheus:
    image: prom/prometheus:v2.52.0  # Apache-2.0
    restart: unless-stopped
    ports: ["9091:9090"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana-oss:10.4.3  # AGPL-3.0
    restart: unless-stopped
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes: [grafana_data:/var/lib/grafana]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  vault_data:
  killbill_db_data:
  prometheus_data:
  grafana_data:
